            - img "Captura de componente de MIO WEB 1" [ref=e77]
            - img "Captura de componente de MIO WEB 2" [ref=e78]
            - img "Captura de componente de MIO WEB 3" [ref=e79]
        - generic [ref=e82]:
          - generic [ref=e83]:
            - heading "Construido para el trabajo real." [level=2] [ref=e85]
            - paragraph [ref=e86]: Me enfoqué en los componentes que realmente íbamos a reutilizar. Las variaciones en botones y estados fueron intencionales y limitadas para evitar la sobrecarga de opciones. Las convenciones de nombres se mantuvieron simples y predecibles para que cualquier desarrollador pudiera usarlas sin fricción.
          - generic [ref=e89]:
            - img "Captura de Construido para el trabajo real."
        - generic [ref=e93]:
          - heading "Diseñado para ser compartido." [level=2] [ref=e95]
          - paragraph [ref=e96]: En un entorno dinámico, el valor del sistema se volvió obvio. Redujo el tiempo de diseño, mejoró la consistencia y facilitó el desarrollo de nuevas secciones. En lugar de repensar decisiones o dudar sobre qué variante usar, el sistema creó una línea base compartida que mantuvo a toda la interfaz alineada.
