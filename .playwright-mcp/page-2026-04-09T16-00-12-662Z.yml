        - paragraph [ref=e20]: Mio Web se mueve rápido. Los requerimientos pueden ajustarse y hay poco margen para la inconsistencia. Sin una estructura sólida, entregar interfaces de alta calidad a ese ritmo se vuelve riesgoso. Como líder frontend, construí el sistema de diseño para darle al proyecto una base firme bajo presión y agilizar la creación de nuevas vistas sin perder coherencia.
