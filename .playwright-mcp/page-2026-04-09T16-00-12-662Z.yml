            - 'heading "Dashboard: El corazón de los datos." [level=2] [ref=e41]'
            - paragraph [ref=e42]: Aplicando el sistema de diseño, creamos un panel de métricas críticas. Tarjetas modulares y gráficos simples que permiten al paciente ver su progreso histórico, reduciendo la carga cognitiva y facilitando decisiones de salud.
          - 'img "Captura de Dashboard: El corazón de los datos." [ref=e46]'
        - generic [ref=e49]:
          - generic [ref=e50]:
            - heading "Layout y Sistema de Grillas." [level=2] [ref=e52]
            - paragraph [ref=e53]: Definimos una estructura sólida para vistas complejas, como la autenticación. Separar la pantalla en áreas lógicas (una columna de branding oscura y una de acción clara con gradientes) asegura que el usuario no se pierda al iniciar sesión o completar su perfil médico.
          - generic [ref=e56]:
            - img "Captura de Layout y Sistema de Grillas."
        - generic [ref=e59]:
          - generic [ref=e60]:
            - 'heading "Fundamentos: Tipografía y Color." [level=2] [ref=e62]'
            - paragraph [ref=e63]: La base visual de MIO. Plus Jakarta Sans aporta carácter y legibilidad en los títulos (Display y Heading), mientras que Inter actúa como la columna vertebral para la lectura de datos médicos complejos. La paleta, centrada en tonos violetas vibrantes contrastados con fondos oscuros, define jerarquías claras sin ser abrumadora.
          - generic [ref=e66]:
            - 'img "Captura de Fundamentos: Tipografía y Color."'
        - generic [ref=e69]:
          - generic [ref=e70]:
            - heading "Métricas y Tarjetas Modulares." [level=2] [ref=e72]
            - paragraph [ref=e73]: Desglosamos la información clínica en componentes independientes y visuales. El diseño atómico permite componer distintas vistas del dashboard sin repetir lógica ni estilos, garantizando jerarquía clara para métricas vitales, gráficos de evolución y títulos de sección en toda la plataforma.
